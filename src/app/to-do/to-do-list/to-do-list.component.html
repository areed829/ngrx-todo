<div class="container-fluid mt-5">
  <div class="row">
    <div class="col-5 mx-auto">
      <h3 class="text-center">
        Todo List
      </h3>
      <ul class="mt-5 list-group">
        <li *ngFor="let task of tasks$ | async" class="list-group-item">
          <input type="checkbox" [checked]="task.completed" />
          {{ task.title }}
        </li>
      </ul>
    </div>
  </div>
</div>
